{% extends "base.html" %}
{% block title %}Nieuw wachtwoord – NoteStream{% endblock %}

{% block body %}
<style>
  body { display: flex; align-items: center; justify-content: center; padding: 20px; }
  .wrap { width: 100%; max-width: 420px; position: relative; z-index: 1; }
</style>

<div class="wrap">
  <div class="card">

    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#060a12" stroke-width="2.5" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <span class="logo-text">NoteStream</span>
    </div>

    <h1>Nieuw wachtwoord</h1>
    <p class="subtitle">Kies een sterk nieuw wachtwoord voor je account.</p>

    <form method="POST" action="/reset/{{ token }}">
      <label class="field-label">Nieuw wachtwoord</label>
      <input name="password" type="password" autocomplete="new-password"
             placeholder="Minimaal 8 tekens" required minlength="8" />
      <button class="btn" type="submit">Wachtwoord opslaan</button>
    </form>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <hr class="divider">

    <div class="nav-row">
      <a class="btn-ghost" href="/login">← Terug naar login</a>
    </div>

  </div>
</div>
{% endblock %}
