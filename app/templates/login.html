{% extends "base.html" %}
{% block title %}Inloggen – NoteStream{% endblock %}

{% block body %}
<style>
  body { display: flex; align-items: center; justify-content: center; padding: 20px; }
  .wrap { width: 100%; max-width: 420px; position: relative; z-index: 1; }
</style>

<div class="wrap">
  <div class="card">

    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#060a12" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
      </div>
      <span class="logo-text">NoteStream</span>
    </div>

    <h1>Welkom terug</h1>
    <p class="subtitle">Log in om je vergadernotities te bekijken.</p>

    <form method="POST" action="/login">
      <label class="field-label">E-mail</label>
      <input name="email" type="email" autocomplete="email" placeholder="jij@bedrijf.nl" required />

      <label class="field-label">Wachtwoord</label>
      <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />

      <button class="btn" type="submit">Inloggen</button>
    </form>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <hr class="divider">

    <div class="nav-row">
      <a class="btn-ghost" href="/register">Account aanmaken →</a>
      <a class="btn-ghost" href="/forgot">Wachtwoord vergeten?</a>
    </div>

  </div>
</div>
{% endblock %}
